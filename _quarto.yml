project:
  type: website
  render:                 # .ipynb excluded: notebooks are artifacts, .md is the page source
    - "*.qmd"
    - "**/*.qmd"
    - "**/*.md"

website:
  title: "CDAT 4001 — Data Science"
  site-url: https://devomh.github.io/cdat4001-2026/
  page-navigation: true
  sidebar:
    style: docked
    search: true
    contents:
      - index.qmd
      # Modules are added here as lessons are published, grouped by unit:
      - section: "Unit I — Introduction"
        contents:
          - u01_introduction/l01_concept_intro_data_science.qmd
      - section: "Unit II — Big Data"
        contents:
          - u02_big_data/l02_concept_databases_sql.qmd
          - u02_big_data/l02_lab_querying_duckdb.md
          - u02_big_data/l03_concept_csv_vs_parquet.qmd
          - u02_big_data/l03_lab_benchmark_formats.md
          - u02_big_data/l04_concept_json_web_apis.qmd
          - u02_big_data/l04_lab_air_quality_api.md
          - u02_big_data/l05_concept_nosql.qmd
          - u02_big_data/l05_lab_tables_vs_documents.md
          - u02_big_data/l06_concept_scaling_spark.qmd
          - u02_big_data/l06_lab_mapreduce_pyspark.md
      - section: "Unit III — Exploratory Data Analysis"
        contents:
          - u03_eda/l07_concept_univariate_eda.qmd
          - u03_eda/l07_lab_univariate_eda.md
          - u03_eda/l08_concept_bivariate_correlation.qmd
          - u03_eda/l08_lab_bivariate_correlation.md
          - u03_eda/l09_lab_eda_mini_project.md
      - section: "Unit IV — Data Mining"
        contents:
          - u04_data_mining/l10_concept_feature_engineering.qmd
          - u04_data_mining/l10_lab_text_features_spam.md
          - u04_data_mining/l11_concept_feature_selection.qmd
          - u04_data_mining/l11_lab_feature_selection_spam.md
      - section: "Unit V — Visualization"
        contents:
          - u05_visualization/l12_concept_spatial_geopandas.qmd
          - u05_visualization/l12_lab_mapping_earthquakes.md
          - u05_visualization/l13_concept_temporal_patterns.qmd
          - u05_visualization/l13_lab_san_juan_climate.md
          - u05_visualization/l14_concept_many_variables_pca.qmd
          - u05_visualization/l14_lab_penguins_pca.md
      - section: "Unit VI — Recommender Systems"
        contents:
          - u06_recommender_systems/l15_concept_recommender_systems.qmd
          - u06_recommender_systems/l15_lab_movie_recommenders.md

format:
  html:
    theme: cosmo
    mermaid:
      theme: neutral      # default theme gives dark subgraph fills (unreadable in light mode)
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    html-math-method: katex

execute:
  freeze: auto
